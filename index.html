<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tone Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #111;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --border2: #333;
      --text: #e8e8e8;
      --muted: #777;
      --accent: #4a9eff;
      --accent-dim: #1a3a5c;
      --on: #22c55e;
      --on-dim: #14532d;
      --left-col: #4a9eff;
      --right-col: #e06c75;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 2rem 1rem;
    }

    h1 {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }

    .channels {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 0;
      width: 100%;
      max-width: 780px;
      margin-bottom: 1rem;
    }

    .channel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.25rem;
    }

    .channel-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 1rem;
    }

    .ch-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .ch-l .ch-dot { background: var(--left-col); }
    .ch-r .ch-dot { background: var(--right-col); }

    .ch-label {
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .ch-l .ch-label { color: var(--left-col); }
    .ch-r .ch-label { color: var(--right-col); }

    .ch-freq {
      text-align: center;
      margin-bottom: 1rem;
    }

    .ch-hz {
      font-size: 2rem;
      font-weight: 300;
      letter-spacing: -0.02em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .ch-hz small {
      font-size: 0.9rem;
      color: var(--muted);
      margin-left: 3px;
    }

    .ch-note {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 3px;
      min-height: 1.2rem;
    }

    .ch-note em { font-style: normal; color: var(--left-col); }
    .ch-r .ch-note em { color: var(--right-col); }

    .row { margin-bottom: 0.75rem; }

    .row-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.68rem;
      color: var(--muted);
      margin-bottom: 4px;
    }

    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 3px;
      background: var(--border2);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--left-col);
      border: none;
    }

    input[type=range]::-moz-range-thumb {
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--left-col);
      border: none;
      cursor: pointer;
    }

    .ch-r input[type=range]::-webkit-slider-thumb { background: var(--right-col); }
    .ch-r input[type=range]::-moz-range-thumb     { background: var(--right-col); }

    .ft-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 0.75rem;
    }

    .ft-row span {
      flex: 1;
      text-align: center;
      font-size: 0.65rem;
      color: var(--muted);
    }

    .ft-btn {
      width: 32px; height: 32px;
      border-radius: 7px;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--text);
      font-size: 1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      user-select: none; -webkit-user-select: none;
      transition: all 0.12s;
      flex-shrink: 0;
    }

    .ft-btn:hover { border-color: var(--accent); color: var(--accent); }

    .ch-inputs {
      display: flex;
      gap: 6px;
      margin-bottom: 0.75rem;
    }

    .ig {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .ig label {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .ig input[type=number],
    .ig select {
      width: 100%;
      padding: 0.3rem 0.4rem;
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.8rem;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }

    .ig input[type=number]:focus,
    .ig select:focus { border-color: var(--accent); }
    .ig input[type=number]::-webkit-inner-spin-button { opacity: 0.3; }

    .ns { display: flex; gap: 4px; }
    .ns select:first-child { flex: 3; }
    .ns select:last-child  { flex: 2; }

    .wave-row { display: flex; gap: 4px; }

    .wave-btn {
      flex: 1;
      padding: 0.35rem 0;
      background: transparent;
      border: 1px solid var(--border2);
      border-radius: 6px;
      color: var(--muted);
      font-size: 0.7rem;
      cursor: pointer;
      transition: all 0.12s;
    }

    .wave-btn:hover { border-color: var(--accent); color: var(--text); }

    .wave-btn.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    .ch-r .wave-btn:hover  { border-color: var(--right-col); }
    .ch-r .wave-btn.active { background: #3a1520; border-color: var(--right-col); color: var(--right-col); }

    .lock-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 0.5rem;
      gap: 6px;
    }

    .lock-line { width: 1px; flex: 1; background: var(--border); }

    #lockBtn {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1px solid var(--border2);
      background: var(--surface);
      color: var(--muted);
      font-size: 1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    #lockBtn:hover { border-color: var(--accent); color: var(--text); }

    #lockBtn.locked {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    .shared {
      width: 100%;
      max-width: 780px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .panel-title {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .pan-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .pan-label {
      font-size: 0.72rem;
      color: var(--muted);
      width: 20px;
      flex-shrink: 0;
    }

    .pan-label.r { text-align: right; }

    #panDisplay {
      font-size: 0.72rem;
      color: var(--muted);
      text-align: center;
      margin-top: 5px;
    }

    .mod-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
    }

    .mod-col-title {
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 0.6rem;
    }

    .mod-col { display: flex; flex-direction: column; gap: 0.55rem; }

    .mod-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .mod-row label {
      font-size: 0.7rem;
      color: var(--muted);
      width: 44px;
      flex-shrink: 0;
    }

    .mod-val {
      font-size: 0.7rem;
      color: var(--text);
      width: 50px;
      text-align: right;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    .mod-wave-row { display: flex; gap: 4px; }

    .mod-wave-btn {
      flex: 1;
      padding: 0.25rem 0;
      background: transparent;
      border: 1px solid var(--border2);
      border-radius: 5px;
      color: var(--muted);
      font-size: 0.65rem;
      cursor: pointer;
      transition: all 0.12s;
    }

    .mod-wave-btn:hover { border-color: var(--accent); color: var(--text); }

    .mod-wave-btn.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    .bottom-row {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .vol-group {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .vol-group label {
      font-size: 0.78rem;
      color: var(--muted);
      white-space: nowrap;
    }

    #toggle {
      padding: 0.7rem 2.5rem;
      border-radius: 10px;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--text);
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.18s;
      white-space: nowrap;
    }

    #toggle:hover { border-color: var(--accent); }

    #toggle.playing {
      background: var(--on-dim);
      border-color: var(--on);
      color: var(--on);
    }

    .offline-badge {
      display: none;
      text-align: center;
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 0.5rem;
    }

    /* shared range thumbs (non-channel) */
    .panel input[type=range]::-webkit-slider-thumb { background: var(--accent); }
    .panel input[type=range]::-moz-range-thumb     { background: var(--accent); }
  </style>
</head>
<body>

<h1>Tone Generator</h1>

<div class="channels">

  <!-- LEFT channel -->
  <div class="channel ch-l">
    <div class="channel-header">
      <div class="ch-dot"></div>
      <span class="ch-label">Left</span>
    </div>
    <div class="ch-freq">
      <div class="ch-hz" id="hzL">—</div>
      <div class="ch-note" id="noteL"></div>
    </div>
    <div class="row">
      <div class="row-header"><span>16 Hz</span><span>20 kHz</span></div>
      <input type="range" id="pitchL" min="0" max="1000" step="1">
    </div>
    <div class="ft-row">
      <button class="ft-btn" data-ch="L" data-dir="-1">−</button>
      <span>fine tune (1¢)</span>
      <button class="ft-btn" data-ch="L" data-dir="1">+</button>
    </div>
    <div class="ch-inputs">
      <div class="ig">
        <label>Hz</label>
        <input type="number" id="freqL" min="16" max="20000" step="0.01">
      </div>
      <div class="ig" style="flex:2">
        <label>Note</label>
        <div class="ns">
          <select id="noteSelL"></select>
          <select id="octSelL"></select>
        </div>
      </div>
    </div>
    <div class="wave-row" id="waveRowL"></div>
  </div>

  <!-- Lock column -->
  <div class="lock-col">
    <div class="lock-line"></div>
    <button id="lockBtn" title="Lock channels together">⛓</button>
    <div class="lock-line"></div>
  </div>

  <!-- RIGHT channel -->
  <div class="channel ch-r">
    <div class="channel-header">
      <div class="ch-dot"></div>
      <span class="ch-label">Right</span>
    </div>
    <div class="ch-freq">
      <div class="ch-hz" id="hzR">—</div>
      <div class="ch-note" id="noteR"></div>
    </div>
    <div class="row">
      <div class="row-header"><span>16 Hz</span><span>20 kHz</span></div>
      <input type="range" id="pitchR" min="0" max="1000" step="1">
    </div>
    <div class="ft-row">
      <button class="ft-btn" data-ch="R" data-dir="-1">−</button>
      <span>fine tune (1¢)</span>
      <button class="ft-btn" data-ch="R" data-dir="1">+</button>
    </div>
    <div class="ch-inputs">
      <div class="ig">
        <label>Hz</label>
        <input type="number" id="freqR" min="16" max="20000" step="0.01">
      </div>
      <div class="ig" style="flex:2">
        <label>Note</label>
        <div class="ns">
          <select id="noteSelR"></select>
          <select id="octSelR"></select>
        </div>
      </div>
    </div>
    <div class="wave-row" id="waveRowR"></div>
  </div>

</div>

<!-- Shared controls -->
<div class="shared">

  <div class="panel">
    <div class="panel-title">Stereo balance</div>
    <div class="pan-row">
      <span class="pan-label">L</span>
      <input type="range" id="panSlider" min="-100" max="100" value="0" step="1" style="flex:1">
      <span class="pan-label r">R</span>
    </div>
    <div id="panDisplay">Centre</div>
  </div>

  <div class="panel">
    <div class="panel-title">Modulation (LFO)</div>
    <div class="mod-grid">

      <div class="mod-col">
        <div class="mod-col-title">Pitch mod</div>
        <div class="mod-row">
          <label>Rate</label>
          <input type="range" id="pmRate" min="0.01" max="20" step="0.01" value="1" style="flex:1">
          <span class="mod-val" id="pmRateVal">1.00 Hz</span>
        </div>
        <div class="mod-row">
          <label>Depth</label>
          <input type="range" id="pmDepth" min="0" max="1200" step="1" value="0" style="flex:1">
          <span class="mod-val" id="pmDepthVal">0 ¢</span>
        </div>
        <div class="mod-wave-row" id="pmWaveRow"></div>
      </div>

      <div class="mod-col">
        <div class="mod-col-title">Volume mod</div>
        <div class="mod-row">
          <label>Rate</label>
          <input type="range" id="vmRate" min="0.01" max="20" step="0.01" value="1" style="flex:1">
          <span class="mod-val" id="vmRateVal">1.00 Hz</span>
        </div>
        <div class="mod-row">
          <label>Depth</label>
          <input type="range" id="vmDepth" min="0" max="100" step="1" value="0" style="flex:1">
          <span class="mod-val" id="vmDepthVal">0 %</span>
        </div>
        <div class="mod-wave-row" id="vmWaveRow"></div>
      </div>

    </div>
  </div>

  <div class="panel">
    <div class="bottom-row">
      <div class="vol-group">
        <label for="volSlider">Master vol</label>
        <input type="range" id="volSlider" min="0" max="100" value="60" step="1" style="flex:1">
      </div>
      <button id="toggle">Start</button>
    </div>
  </div>

  <div class="offline-badge" id="offlineBadge">● Cached — works offline</div>
</div>

<script>
const MIN_HZ = 16, MAX_HZ = 20000;
const LOG_MIN = Math.log2(MIN_HZ), LOG_MAX = Math.log2(MAX_HZ);
const CENT = Math.pow(2, 1/1200);
const NOTE_NAMES = ['C','C♯','D','D♯','E','F','F♯','G','G♯','A','A♯','B'];
const WAVES = ['sine','triangle','sawtooth','square'];
const WAVE_LABELS = ['Sine','Tri','Saw','Sqr'];

function sliderToHz(v) { return Math.pow(2, LOG_MIN + (v/1000)*(LOG_MAX-LOG_MIN)); }
function hzToSlider(hz) { return ((Math.log2(hz)-LOG_MIN)/(LOG_MAX-LOG_MIN))*1000; }
function midiToHz(m) { return 440*Math.pow(2,(m-69)/12); }
function hzToMidiExact(hz) { return 12*Math.log2(hz/440)+69; }

function formatHz(hz) {
  if (hz >= 1000) return `${(hz/1000).toFixed(2)}<small>kHz</small>`;
  return `${hz.toFixed(2)}<small>Hz</small>`;
}

function noteHtml(hz) {
  const exact = hzToMidiExact(hz), midi = Math.round(exact);
  if (midi < 0 || midi > 127) return '';
  const note = NOTE_NAMES[midi%12], oct = Math.floor(midi/12)-1;
  const cents = Math.round((exact-midi)*100);
  const c = cents===0 ? '' : (cents>0 ? ` +${cents}¢` : ` ${cents}¢`);
  return `<em>${note}${oct}</em>${c}`;
}

// Channel state
const CH = {
  L: { hz: 440, wave: 'sine', osc: null, chGain: null },
  R: { hz: 440, wave: 'sine', osc: null, chGain: null },
};

let ctx=null, merger=null, masterGain=null;
let pmLFO=null, pmDepthGain=null;
let vmLFO=null, vmDepthGain=null, vmBaseGain=null;
let playing=false, locked=false;

const mod = {
  pm: { rate:1, depth:0, wave:'sine' },
  vm: { rate:1, depth:0, wave:'sine' },
};

// Build waveform buttons for a channel
function buildWaveButtons(containerId, ch) {
  const row = document.getElementById(containerId);
  WAVES.forEach((w, i) => {
    const btn = document.createElement('button');
    btn.className = 'wave-btn' + (w==='sine' ? ' active' : '');
    btn.textContent = WAVE_LABELS[i];
    btn.dataset.wave = w;
    btn.addEventListener('click', () => {
      row.querySelectorAll('.wave-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      CH[ch].wave = w;
      if (CH[ch].osc) CH[ch].osc.type = w;
      if (locked) setWave(ch==='L'?'R':'L', w);
    });
    row.appendChild(btn);
  });
}
buildWaveButtons('waveRowL','L');
buildWaveButtons('waveRowR','R');

function setWave(ch, wave) {
  CH[ch].wave = wave;
  if (CH[ch].osc) CH[ch].osc.type = wave;
  const row = document.getElementById('waveRow'+ch);
  row.querySelectorAll('.wave-btn').forEach(b => b.classList.toggle('active', b.dataset.wave===wave));
}

// Build mod LFO waveform buttons
function buildModWaveButtons(containerId, modKey) {
  const row = document.getElementById(containerId);
  WAVES.forEach((w, i) => {
    const btn = document.createElement('button');
    btn.className = 'mod-wave-btn' + (w==='sine' ? ' active' : '');
    btn.textContent = WAVE_LABELS[i];
    btn.addEventListener('click', () => {
      row.querySelectorAll('.mod-wave-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      mod[modKey].wave = w;
      if (modKey==='pm' && pmLFO) pmLFO.type = w;
      if (modKey==='vm' && vmLFO) vmLFO.type = w;
    });
    row.appendChild(btn);
  });
}
buildModWaveButtons('pmWaveRow','pm');
buildModWaveButtons('vmWaveRow','vm');

// Populate note selects
function populateNoteSelects(ch) {
  const ns = document.getElementById('noteSel'+ch);
  const os = document.getElementById('octSel'+ch);
  NOTE_NAMES.forEach(n => { const o=document.createElement('option'); o.value=o.textContent=n; ns.appendChild(o); });
  for (let i=0;i<=9;i++) { const o=document.createElement('option'); o.value=o.textContent=i; os.appendChild(o); }
  ns.value='A'; os.value='4';
}
populateNoteSelects('L');
populateNoteSelects('R');

function noteSelectHz(ch) {
  const ns=document.getElementById('noteSel'+ch), os=document.getElementById('octSel'+ch);
  return midiToHz((parseInt(os.value)+1)*12 + NOTE_NAMES.indexOf(ns.value));
}

// Core frequency setter — all controls funnel through here
function setHz(ch, hz, source) {
  hz = Math.max(MIN_HZ, Math.min(MAX_HZ, hz));
  CH[ch].hz = hz;
  if (source!=='slider')   document.getElementById('pitch'+ch).value = hzToSlider(hz);
  if (source!=='freq')     document.getElementById('freq'+ch).value  = hz.toFixed(2);
  document.getElementById('hz'+ch).innerHTML   = formatHz(hz);
  document.getElementById('note'+ch).innerHTML = noteHtml(hz);
  if (CH[ch].osc) CH[ch].osc.frequency.setTargetAtTime(hz, ctx.currentTime, 0.01);
  if (locked && source!=='_mirror') setHz(ch==='L'?'R':'L', hz, '_mirror');
}

// Wire up controls for both channels
['L','R'].forEach(ch => {
  document.getElementById('pitch'+ch).value = hzToSlider(440);

  document.getElementById('pitch'+ch).addEventListener('input', e => {
    setHz(ch, sliderToHz(e.target.value), 'slider');
  });
  document.getElementById('freq'+ch).addEventListener('change', e => {
    const v=parseFloat(e.target.value); if(!isNaN(v)) setHz(ch,v,'freq');
  });
  document.getElementById('freq'+ch).addEventListener('keydown', e => {
    if(e.key==='Enter') e.target.blur();
  });
  document.getElementById('noteSel'+ch).addEventListener('change', () => setHz(ch,noteSelectHz(ch),'note'));
  document.getElementById('octSel'+ch).addEventListener('change',  () => setHz(ch,noteSelectHz(ch),'note'));
});

// Fine tune — hold to repeat
let holdTimer=null, holdInterval=null;
document.querySelectorAll('.ft-btn').forEach(btn => {
  const ch=btn.dataset.ch, dir=parseInt(btn.dataset.dir);
  const nudge = () => setHz(ch, CH[ch].hz * Math.pow(CENT,dir), null);
  ['mousedown','touchstart'].forEach(ev => btn.addEventListener(ev, e => {
    e.preventDefault(); nudge();
    holdTimer=setTimeout(()=>{ holdInterval=setInterval(nudge,40); },350);
  }));
  ['mouseup','mouseleave','touchend','touchcancel'].forEach(ev => btn.addEventListener(ev, ()=>{
    clearTimeout(holdTimer); clearInterval(holdInterval);
  }));
});

// Lock
document.getElementById('lockBtn').addEventListener('click', () => {
  locked = !locked;
  document.getElementById('lockBtn').classList.toggle('locked', locked);
  if (locked) setHz('R', CH.L.hz, '_mirror');
});

// Stereo balance — equal-power crossfade
const panSlider  = document.getElementById('panSlider');
const panDisplay = document.getElementById('panDisplay');

function applyPan(v) {
  if (!CH.L.chGain) return;
  const t=(v+100)/200;
  CH.L.chGain.gain.setTargetAtTime(Math.cos(t*Math.PI/2), ctx.currentTime, 0.02);
  CH.R.chGain.gain.setTargetAtTime(Math.sin(t*Math.PI/2), ctx.currentTime, 0.02);
}

panSlider.addEventListener('input', () => {
  const v=parseInt(panSlider.value);
  panDisplay.textContent = v===0 ? 'Centre' : v<0 ? `L ${-v}%` : `R ${v}%`;
  applyPan(v);
});

// Pitch mod controls
document.getElementById('pmRate').addEventListener('input', e => {
  mod.pm.rate=parseFloat(e.target.value);
  document.getElementById('pmRateVal').textContent=mod.pm.rate.toFixed(2)+' Hz';
  if(pmLFO) pmLFO.frequency.setValueAtTime(mod.pm.rate, ctx.currentTime);
});
document.getElementById('pmDepth').addEventListener('input', e => {
  mod.pm.depth=parseInt(e.target.value);
  document.getElementById('pmDepthVal').textContent=mod.pm.depth+' ¢';
  updatePmDepth();
});

function avgHz() { return (CH.L.hz+CH.R.hz)/2; }
function updatePmDepth() {
  if (!pmDepthGain) return;
  const depthHz = avgHz()*(Math.pow(2,mod.pm.depth/1200)-1);
  pmDepthGain.gain.setValueAtTime(depthHz, ctx.currentTime);
}

// Volume mod controls
document.getElementById('vmRate').addEventListener('input', e => {
  mod.vm.rate=parseFloat(e.target.value);
  document.getElementById('vmRateVal').textContent=mod.vm.rate.toFixed(2)+' Hz';
  if(vmLFO) vmLFO.frequency.setValueAtTime(mod.vm.rate, ctx.currentTime);
});
document.getElementById('vmDepth').addEventListener('input', e => {
  mod.vm.depth=parseInt(e.target.value);
  document.getElementById('vmDepthVal').textContent=mod.vm.depth+' %';
  if(vmDepthGain) vmDepthGain.gain.setValueAtTime(mod.vm.depth/100, ctx.currentTime);
});

// Master volume
document.getElementById('volSlider').addEventListener('input', e => {
  if(masterGain) masterGain.gain.setTargetAtTime(e.target.value/100, ctx.currentTime, 0.01);
});

// Start / Stop
document.getElementById('toggle').addEventListener('click', () => {
  const btn = document.getElementById('toggle');
  if (!playing) {
    ctx = new (window.AudioContext||window.webkitAudioContext)();

    masterGain = ctx.createGain();
    masterGain.gain.setValueAtTime(document.getElementById('volSlider').value/100, ctx.currentTime);
    masterGain.connect(ctx.destination);

    // Volume LFO → depthGain → vmBaseGain.gain (tremolo)
    vmBaseGain = ctx.createGain();
    vmBaseGain.gain.setValueAtTime(1, ctx.currentTime);
    vmBaseGain.connect(masterGain);

    vmLFO = ctx.createOscillator();
    vmLFO.type = mod.vm.wave;
    vmLFO.frequency.setValueAtTime(mod.vm.rate, ctx.currentTime);
    vmDepthGain = ctx.createGain();
    vmDepthGain.gain.setValueAtTime(mod.vm.depth/100, ctx.currentTime);
    vmLFO.connect(vmDepthGain);
    vmDepthGain.connect(vmBaseGain.gain);
    vmLFO.start();

    // Channel merger
    merger = ctx.createChannelMerger(2);
    merger.connect(vmBaseGain);

    // Pitch LFO
    pmLFO = ctx.createOscillator();
    pmLFO.type = mod.pm.wave;
    pmLFO.frequency.setValueAtTime(mod.pm.rate, ctx.currentTime);
    pmDepthGain = ctx.createGain();
    pmLFO.connect(pmDepthGain);
    pmLFO.start();
    updatePmDepth();

    // Per-channel oscillators
    ['L','R'].forEach((ch, i) => {
      CH[ch].chGain = ctx.createGain();
      CH[ch].chGain.gain.setValueAtTime(1, ctx.currentTime);
      CH[ch].chGain.connect(merger, 0, i);

      CH[ch].osc = ctx.createOscillator();
      CH[ch].osc.type = CH[ch].wave;
      CH[ch].osc.frequency.setValueAtTime(CH[ch].hz, ctx.currentTime);
      pmDepthGain.connect(CH[ch].osc.frequency);
      CH[ch].osc.connect(CH[ch].chGain);
      CH[ch].osc.start();
    });

    applyPan(parseInt(panSlider.value));

    playing=true; btn.textContent='Stop'; btn.classList.add('playing');
  } else {
    masterGain.gain.setTargetAtTime(0, ctx.currentTime, 0.02);
    setTimeout(() => {
      ['L','R'].forEach(ch => { CH[ch].osc.stop(); CH[ch].osc=null; CH[ch].chGain=null; });
      pmLFO.stop(); vmLFO.stop();
      ctx.close(); ctx=null;
      merger=masterGain=pmLFO=pmDepthGain=vmLFO=vmDepthGain=vmBaseGain=null;
    }, 150);
    playing=false; btn.textContent='Start'; btn.classList.remove('playing');
  }
});

// Init
setHz('L', 440, null);
setHz('R', 440, null);

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').then(() => {
    document.getElementById('offlineBadge').style.display='block';
  });
}
</script>
</body>
</html>
