<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tone Generator</title>
  <link rel="stylesheet" href="./css/styles.css">
</head>

<body>
  <div class="app">
<div id="controls">
        <div class="stereo-header">
          <button id="power">Start</button>
  <label>
    <input type="checkbox" id="lockAll" checked>
    Link L/R
  </label>
</div>

<div class="stereo">

  <div class="channel">
    <h3>Left</h3>

    <tone-dial label="Freq L" id="freqL" min="100" max="2000" value="880" log></tone-dial>
    <tone-dial label="Vol L" id="volL" min="0" max="1" value="0.3"></tone-dial>
    <tone-dial label="Rate L" id="rateL" min="0.01" max="5" value="0.1" log></tone-dial>
    <tone-dial label="Depth L" id="depthL" min="0" max="50" value="5"></tone-dial>

  </div>

  <div class="channel">
    <h3>Right</h3>

    <tone-dial label="Freq R" id="freqR" min="100" max="2000" value="880" log></tone-dial>
    <tone-dial label="Vol R" id="volR" min="0" max="1" value="0.3"></tone-dial>
    <tone-dial label="Rate R" id="rateR" min="0.01" max="5" value="0.1" log></tone-dial>
    <tone-dial label="Depth R" id="depthR" min="0" max="50" value="5"></tone-dial>

  </div>

</div>
        </div>
    </div>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
